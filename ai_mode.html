<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI ROUTE WORKSPACE</title>
    <link rel="stylesheet" href="assets/css/ai_mode.css">
        </head>
        <body>

        <div class="viewport" id="viewport">
        <div id="canvas-wrapper">
        <img id="wall-img" src="Correct Real Wall Photo.jpeg">
        <svg id="overlay"></svg>
        <svg id="stickman-overlay" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none; z-index:20;"></svg>
        </div>
        </div>

        <div class="sidebar">
        <div class="status">AI ROUTE WORKSPACE</div>

        <div style="display:flex; gap:10px;">
        <button class="tool-btn btn-purple" id="btn-toggle-config" onclick="toggleConfig()" style="flex:1;">CONFIGURE AI</button>
        <button class="tool-btn btn-blue" id="btn-play-beta" onclick="playBeta()" style="flex:1; display:none;">PLAY BETA 🏃</button>
        </div>

    <div id="ai-config" class="ai-config-panel box">
        <div class="form-group">
            <label>User Height: <span id="val-height" style="color:white">1.70m</span></label>
            <input type="range" id="ai-height" min="1.0" max="2.0" step="0.01" value="1.70" oninput="document.getElementById('val-height').innerText = parseFloat(this.value).toFixed(2) + 'm'">
        </div>
        <div class="form-group">
            <label>Wingspan: <span id="val-wingspan" style="color:white">1.70m</span></label>
            <input type="range" id="ai-wingspan" min="1.0" max="2.0" step="0.01" value="1.70" oninput="document.getElementById('val-wingspan').innerText = parseFloat(this.value).toFixed(2) + 'm'">
        </div>
        <div class="form-group">
            <label>Target Grade: <span id="val-grade" style="color:white">V4</span></label>
            <input type="range" id="ai-grade" min="0" max="11" step="1" value="4" oninput="document.getElementById('val-grade').innerText = 'V' + this.value">
        </div>
        <div class="form-group">
            <label>Route Length: <span id="val-length" style="color:white">4.0m</span></label>
            <input type="range" id="ai-length" min="2.0" max="6.0" step="0.1" value="4.0" oninput="document.getElementById('val-length').innerText = parseFloat(this.value).toFixed(1) + 'm'">
        </div>
        <div class="form-group">
            <label>Hold Density: <span id="val-density" style="color:white">80%</span></label>
            <input type="range" id="ai-density" min="10" max="100" step="1" value="80" oninput="document.getElementById('val-density').innerText = this.value + '%'">
        </div>

        <div class="form-group">
            <label>Seed</label>
            <div style="display:flex; gap:8px; align-items:center;">
                <input type="number" id="ai-seed" style="flex:1; background:#111; border:1px solid #444; color:white; padding:8px; border-radius:4px; font-family:monospace;" value="12345">
                <button class="tool-btn btn-blue" type="button" onclick="randomizeSeed()" style="width:auto; margin-bottom:0; padding:8px 12px;">RANDOMIZE</button>
            </div>
            <div style="font-size:9px; color:#666; margin-top:4px;">Use the same seed to reproduce the same route sequence.</div>
        </div>

        <label style="font-size:10px; color:#aaa;">HOLD CATEGORIES</label>
        <div class="checkbox-group">
            <label class="checkbox-item"><input type="checkbox" id="ai-cat-c" checked> Climbing</label>
            <label class="checkbox-item"><input type="checkbox" id="ai-cat-i" checked> Insert</label>
            <label class="checkbox-item"><input type="checkbox" id="ai-cat-f"> Feature</label>
        </div>

        <button class="tool-btn btn-purple" style="margin-top:20px;" onclick="generate()">GENERATE NEW ROUTE</button>
    </div>

    <div class="box" id="route-details" style="display:none;">
        <div class="box-title">Active Route Stats</div>
        <div id="route-id-name" style="font-family:monospace; font-weight:bold; color:white; font-size:16px;">-</div>
        <div class="stat-grid">
            <div class="stat-card">
                <div class="stat-val" id="stat-dist">0.00m</div>
                <div class="stat-label">Estimated Distance</div>
            </div>
            <div class="stat-card">
                <div class="stat-val" id="stat-holds">0</div>
                <div class="stat-label">Total Holds</div>
            </div>
        </div>

        <div class="box-title" style="margin-top:20px;">Movement Sequence</div>
        <div id="seq-list" class="hold-list"></div>
    </div>

    <div id="feedback-panel" class="feedback-box">
        <div style="font-size:11px; color:#28a745; font-weight:bold; text-transform:uppercase;">Report Problem for <span id="feedback-target">Selection</span></div>
        <textarea id="feedback-text" placeholder="Explain what is wrong with this move/hold..."></textarea>
        <div style="font-size:9px; color:#666; margin-top:5px;">Comments will be saved automatically when you generate a new route.</div>
    </div>
</div>

<script src="assets/js/ai_mode.js"></script>
<script type="module" src="assets/js/ai_mode_bootstrap.js"></script>
</body>
</html>
